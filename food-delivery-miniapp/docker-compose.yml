version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: food-delivery-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: food_delivery
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: food-delivery-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - food-delivery-network

  backend:
    build: ./server
    container_name: food-delivery-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_NAME: food_delivery
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - ./server/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - food-delivery-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  food-delivery-network:
    driver: bridge
