<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Waves</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        position: relative;
      }

      [data-us-project] {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div data-us-project="N9XzvQXu7fA5SY2ewADJ"></div>

    <script>
      ;(function () {
        var pid = new URLSearchParams(window.location.search).get("project")
        if (pid) {
          var el = document.querySelector("[data-us-project]")
          if (el) el.setAttribute("data-us-project", pid)
        }
      })()
    </script>

    <script type="text/javascript">
      !function () {
        if (!window.UnicornStudio) {
          window.UnicornStudio = { isInitialized: !1 }
          var i = document.createElement("script")
          i.src =
            "https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v1.4.30/dist/unicornStudio.umd.js"
          i.onload = function () {
            window.UnicornStudio.isInitialized ||
              (UnicornStudio.init(),
              (window.UnicornStudio.isInitialized = !0))
          }
          ;(document.head || document.body).appendChild(i)
        }
      })()
    </script>
  </body>
</html>
